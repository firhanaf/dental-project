name: CI/CD

on:
  push:
    branches: [main]

jobs:
  # ── Job 1: Verifikasi build Go ─────────────────────────────────
  build-check:
    name: Build Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache-dependency-path: dental-api/go.sum

      - name: Verify Go build
        working-directory: dental-api
        run: go build ./...

      - name: Run tests
        working-directory: dental-api
        run: go test ./...

  # ── Job 2: Deploy ke VPS ───────────────────────────────────────
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: build-check

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script_stop: true
          script: |
            cd ${{ secrets.VPS_PROJECT_PATH }}
            bash scripts/deploy.sh
