# ── Local Development ─────────────────────────────────────────
# Hanya menjalankan postgres + adminer. Go server tetap dijalankan
# secara native (make run) agar hot-reload mudah.
#
# Setup awal:
#   1. cp dental-api/.env.example dental-api/.env
#   2. Edit dental-api/.env — pastikan DB_HOST=localhost
#   3. docker compose -f docker-compose.dev.yml up -d
#   4. Tunggu postgres ready, lalu: cd dental-api && make migrate
#   5. cd dental-api && make run
#
# Akses:
#   API      → http://localhost:8080
#   Adminer  → http://localhost:8081  (server: postgres, user/pass sesuai .env)

services:

  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"        # expose ke host untuk koneksi native
    environment:
      POSTGRES_USER: ${DB_USER:-dental}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-dental_dev}
      POSTGRES_DB: ${DB_NAME:-dentaldb}
    volumes:
      - pg-data-dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-dental} -d ${DB_NAME:-dentaldb}"]
      interval: 3s
      timeout: 3s
      retries: 15
    restart: unless-stopped

  adminer:
    image: adminer:4
    ports:
      - "8081:8080"
    environment:
      ADMINER_DEFAULT_SERVER: postgres
    depends_on:
      - postgres
    restart: unless-stopped

volumes:
  pg-data-dev:
